apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: default
  namespace: velero
spec:
  accessMode: ReadWrite
  credential:
    name: cloud-credentials
    key: cloud
  config:
    region: minio
    s3ForcePathStyle: "true"
    s3Url: http://minio.velero.svc:9000
  default: true
  objectStorage:
    bucket: velero-mcp-a
  provider: aws
  validationFrequency: "5s"
